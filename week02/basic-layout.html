<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title element content added -->
    <title>Basic HTML Structure</title>
    <!-- Meta description added -->
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <!-- Meta author added with placeholder name (replace with your name) -->
    <meta name="author" content="Thomas Matwale">
</head>

<body>
    <!-- Header with logo image -->
    <header>
        <img src="images/basic-logo.png" alt="Basic logo placeholder" width="128" height="128">
    </header>

    <!-- Navigation with unordered list and external links -->
    <nav>
        <ul>
            <li><a href="https://www.churchofjesuschrist.org" target="_blank" rel="noopener">Church
                    website</a></li>
            <li><a href="https://www.byu.edu" target="_blank" rel="noopener">BYU homepage</a></li>
        </ul>
    </nav>

    <!-- Main content area -->
    <main>
        <h1>Basic HTML Structure</h1>

        <!-- First section with heading and placeholder paragraph -->
        <section>
            <h2>Basic HTML Structure</h2>
            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Laudantium, dignissimos.
            </p>
        </section>

        <!-- Second section with heading and placeholder paragraph -->
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. At quidem in excepturi quo
                labore eum.</p>
        </section>

        <!-- Aside with temple image from Church Media Gallery -->
        <aside>
            <img
              src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/aba-nigeria/800x500/aba-nigeria-temple-lds-273999-wallpaper.jpg"
              alt="Beautiful temple of The Church of Jesus Christ of Latter-day Saints" width="200">
        </aside>
    </main>

    <!-- Footer with author name -->
    <footer>
        <p>Thomas Matwale</p>
    </footer>
</body>

</html>
